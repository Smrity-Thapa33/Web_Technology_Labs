<!--13) Create a button that sequentially animates the width, height, and
opacity of a <div> element when clicked-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequential Animation</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #box {
            width: 100px;
            height: 100px;
            background-color: rgb(3, 51, 67);
            margin-top: 20px;
        }
        button {
            margin: 5px;
        }
    </style>
    </head>
<body>
    <h2>Sequential Animation Example</h2>
    <button id="animateBtn">Animate</button>
    <button id="resetBtn">Reset</button>
    <div id="box"></div>

    <script>
    $(document).ready(function(){

        // Animate button
        $("#animateBtn").click(function(){
            $("#box")
                .animate({width: "300px"}, 1000)
                .animate({height: "200px"}, 1000)
                .animate({opacity: 0.3}, 1000);
        });

        // Reset button
        $("#resetBtn").click(function(){
            $("#box")
                .animate({width: "100px"}, 500)
                .animate({height: "100px"}, 500)
                .animate({opacity: 1}, 500);
        });

    });
    </script>

</body>
</html>
