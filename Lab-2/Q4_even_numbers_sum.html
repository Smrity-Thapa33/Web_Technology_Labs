<!--4) Write a javascript program to add all even numbers from 1 to 25
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Even Numbers</title>
</head>
<body>
    <h2>Sum of Even Numbers from 1 to 25</h2>
    <button onclick="calculateEvenSum()">Calculate Sum</button>
    <p id="result"></p>

    <script>
        function calculateEvenSum() {
            var sum = 0;
            for (var i = 1; i <= 25; i++) {
                if (i % 2 == 0) {
                    sum = sum + i;
                }
            }
            document.getElementById("result").innerHTML =
                "Sum of even numbers from 1 to 25 is: " + sum;
        }
    </script>
</body>
</html>
