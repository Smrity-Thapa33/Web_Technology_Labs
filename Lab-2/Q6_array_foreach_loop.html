<!--6) Write a program to demonstrate the use of Array and Foreach loop in
javascript.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array and forEach Demo</title>
</head>
<body>

<script>
    // Create an array
    var fruits = ["Apple", "Banana", "Mango", "Orange"];

    // Use forEach loop to display each element
    fruits.forEach(function(value, index){
        document.write("Index " + index + " , Value: " + value + "<br>");
    });
</script>

</body>
</html>
