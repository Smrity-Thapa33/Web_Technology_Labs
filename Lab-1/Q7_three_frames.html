<!--7. Write HTML code to divide web page into 3   frames 20% on left to 
show contents of pages,  60% in center to show body of page, 
remaining on right to show highlights.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Frames Layout</title>
</head>

<frameset cols="20%, 60%, 20%">
    <frame src="Q7_contents.html" name="leftFrame">
    <frame src="Q7_body.html" name="centerFrame">
    <frame src="Q7_highlights.html" name="rightFrame">
</frameset>
</html>
