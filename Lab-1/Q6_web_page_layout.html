<!--6. Write HTML & CSS code to create basic web page layout using 
division. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web page layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header{
            width: 100%;
            height: 15vh;
            background-color: rgb(239, 26, 26);
        }
        .header h3{
            padding-top: 40px;
            padding-left: 40%;
            color: white;
        }
        .navbar{
            width: 100%;
            height: 15vh;
            background-color: rgb(252, 158, 194);
        }
        .partition{
            display: flex;
            height: 50vh;
        }
        .part1{
            background-color: rgb(219, 195, 224);
            flex: 1;
        }
        .part2{
            background-color: rgb(142, 227, 102);
            flex: 1.5;
        }
        .part3{
            background-color: rgb(163, 254, 241);
            flex: 2;
        }
        .footer{
            width: 100%;
            height: 13vh;
            background-color: rgb(125, 124, 124);
        }
        .footer h3{
            padding-top: 40px;
            padding-left: 40%;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>Header</h3>
    </div>
    <div class="navbar"></div>
    <div class="partition">
        <div class="part1"></div>
        <div class="part2"></div>
        <div class="part3"></div>
    </div>
    <div class="footer">
        <h3>Footer</h3>
    </div>
</body>
</html>
