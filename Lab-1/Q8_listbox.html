<!--8.  Write HTML & CSS code to display  list box  into web page.  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Box Example</title>
    <style>
        #selectbox {
            width: 200px;         /* Width of list box */
            height: 60px;        /* Height of list box */
            font-size: 16px; 
            padding: 5px; 
            margin-left: 40px;    /* Font size */
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #f0f0f0;
            color: #333;
        }
        option {
            padding: 5px;
        }
    </style>
</head>
<body>
    <h3>Select Your Favorite Programming Language:</h3>
    <label for="selectbox">Choose a language:</label>
    <select id="selectbox" name="languages">
        <option>Python</option>
        <option>Java</option>
        <option>JavaScript</option>
        <option>C++</option>
        <option>HTML & CSS</option>
    </select>
</body>
</html>
